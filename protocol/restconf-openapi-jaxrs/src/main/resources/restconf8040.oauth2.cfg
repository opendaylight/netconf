# OpenAPI OAuth2/OIDC security scheme
# Authorization endpoint of the identity provider — authorizationCode + PKCE flow.
# Leave empty (default) to disable the OAuth2 scheme in the generated OpenAPI document.
oauth2-authorization-url=http://keycloak.local:8080/realms/odl-realm/protocol/openid-connect/auth
# Token endpoint of the identity provider.
# Leave empty (default) to disable the OAuth2 scheme in the generated OpenAPI document.
oauth2-token-url=http://keycloak.local:8080/realms/odl-realm/protocol/openid-connect/token
# Refresh endpoint of the identity provider.
# Leave empty (default) to omit refreshUrl from the generated OpenAPI document.
oauth2-refresh-url=http://keycloak.local:8080/realms/odl-realm/protocol/openid-connect/token
