# OpenAPI OAuth2/OIDC security scheme
# Authorization endpoint of the identity provider — authorizationCode + PKCE flow.
# Leave empty (default) to disable the OAuth2 scheme in the generated OpenAPI document.
oauth2-authorization-url=
# Token endpoint of the identity provider.
# Leave empty (default) to disable the OAuth2 scheme in the generated OpenAPI document.
oauth2-token-url=
# Refresh endpoint of the identity provider.
oauth2-refresh-url=
