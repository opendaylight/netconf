[tox]
skipsdist = true
envlist =
    pytest

[testenv]
passenv =
    http_proxy
    HTTP_PROXY
    https_proxy
    HTTPS_PROXY
    no_proxy
    NO_PROXY
    JAVA_HOME
usedevelop = true
basepython = python3
deps =
    -r{toxinidir}/requirements.txt
setenv =
    STEP_DEFAULT_TAGS = --step-exclude=exclude

[testenv:pytest]
commands =
    pytest --alluredir=allure-results {env:STEP_DEFAULT_TAGS} {posargs}

[pytest]
minversion = 8.4
addopts = -rAsv --show-capture=no
log_cli = true
log_level = INFO
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
