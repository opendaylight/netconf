[tox]
skipsdist = true
envlist =
    pytest

[testenv]
passenv =
    http_proxy
    HTTP_PROXY
    https_proxy
    HTTPS_PROXY
    no_proxy
    NO_PROXY
    JAVA_HOME
usedevelop = true
basepython = python3
deps =
    -r{toxinidir}/requirements.txt
setenv =
    STEP_DEFAULT_TAGS = --step-exclude=exclude

[testenv:pytest]
commands =
    pytest --alluredir=allure-results {env:STEP_DEFAULT_TAGS} {posargs}

[pytest]
minversion = 8.4
addopts = -rAsv --show-capture=no
log_cli = true
log_level = DEBUG
log_cli_level = INFO
log_format = %(asctime)s.%(msecs)03d [%(levelname)s] %(message)s
markers =
    always: Must run regardless of marker filter (e.g. readiness checks)
    functional: Functional feature tests
    performance: Performance / load tests
    single_device: Tests using a single NETCONF device
    multi_device: Tests using multiple NETCONF devices
    crud: Tests covering NETCONF create, read, update, delete and RPC action operations
    callhome: NETCONF Call Home tests
    authentication: Tests for password, SSH key and TLS certificate authentication
    mdsal: Tests exercising the MD-SAL datastore via NETCONF
    notifications: NETCONF notification and event stream tests
    openapi: RESTCONF OpenAPI tests
    testtool: Tests using the NETCONF testtool sim device
    restperfclient: Tests using the restperfclient load testing tool
    netopeer2: Tests requiring a netopeer2 NETCONF device
    smoke: Fast-running functional tests for the GHA verify job
        (strictly constrained to < 10 min)
